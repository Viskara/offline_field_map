<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1a2030" />
    <title>Field Map – Offline</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%; background: #1a2030;
            font-family: system-ui, Arial, sans-serif;
            display: flex; align-items: center; justify-content: center;
            color: #e8edf5; text-align: center; padding: 24px;
        }
        svg { display: block; margin: 0 auto 24px; }
        h1 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
        p { font-size: 14px; color: #8899aa; line-height: 1.6; max-width: 280px; margin: 0 auto 24px; }
        a {
            display: inline-block; background: #3b9eff; color: white;
            padding: 10px 24px; border-radius: 6px; font-weight: 600;
            font-size: 14px; text-decoration: none;
        }
    </style>
</head>
<body>
    <div>
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="64" height="64" rx="12" fill="#1e293b"/>
            <circle cx="32" cy="32" r="13" stroke="#3b9eff" stroke-width="3"/>
            <circle cx="32" cy="32" r="4" fill="#3b9eff"/>
            <line x1="32" y1="6" x2="32" y2="19" stroke="#3b9eff" stroke-width="3" stroke-linecap="round"/>
            <line x1="32" y1="45" x2="32" y2="58" stroke="#3b9eff" stroke-width="3" stroke-linecap="round"/>
            <line x1="6" y1="32" x2="19" y2="32" stroke="#3b9eff" stroke-width="3" stroke-linecap="round"/>
            <line x1="45" y1="32" x2="58" y2="32" stroke="#3b9eff" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <h1>You're offline</h1>
        <p>No internet connection. If you've previously cached map tiles, open the app and they'll be available.</p>
        <a href="./index.html">Open App</a>
    </div>
</body>
</html>
